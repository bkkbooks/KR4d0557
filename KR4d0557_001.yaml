body:
  text: 鶴年詩集卷一元丁鶴年撰五言古詩採蓮曲採蓮復採蓮仍唱採蓮曲若欲知苦心須食蓮中肉採蓮復採蓮踟蹰一何久不愁花妬容惟恐刺傷手採蓮復採蓮藕亦不可棄申有不斷絲似妾纒綿意採蓮復採蓮爭如採荷好花謝葉獨存團圓以終老採蓮復採蓮湖水清且深徒能照妾面不能照妾心採蓮復採蓮下有孤鴛鴦秋花不結實夜夜守空房又蓮開花覆水蓮謝藕在泥不學青萍葉隨波東復西朝採並蒂蓮暮綰同心結不學緑楊枝含嚬送離别又蓮舟何處來同聚南湖口郎憐波上花妾愛泥中藕藕有青白節花有艷冶容郎心異妾心三歎掩歸蓬五言絶句題天柱圖拔翠五雲中擎天不計功誰能凌絶頂看取日升東畫蟬飲露身何潔吟風韻更長斜陽千萬樹無處避螳螂畫古木幽篁碧海珊瑚樹清湘翡翠毛無因將寄逺日暮寸心勞畫葡萄江海春雷動羣龍悉上天秋來風露冷箇箇抱珠眠題江亭柳色圖有懷故人劉庸道昔年釃酒地江漢一茅亭同會人何在東風柳又青次先兄太守題竹韻先兄死事之十有七年于故史董文中家見所作因雪涕謹次其韻玉笋謝朝班西風海國寒無人知苦節落日下長安題赤壁圖橫槊英聲逺聞簫逸興長至今風月夜鶴夢繞黃岡題謝安觀山圖欲為蒼生起神州未可還籌思保江表安若會稽山題長溪獨釣圖為舒庵作溪上釣西風心隨溪水東後車今已載何待兆非熊題鄭髙士畫竹鄭君髙節士瀟灑絶人羣獨把青鸞尾山窗掃白雲題畫梅竹為郭志善作姑射下天壇天空鬢影寒雪深歸路逈獨自跨青鸞畫梅為某翁作老向江南住梅花共嵗寒故人清興在踏雪幾回看畫蘭同前湘皋風日美芳草不勝春欲採紉為佩慚非楚藎臣畫菜為馬上舍作蔬畦新雨過小摘稱君貧若入君王夢瓊林第一人畫竹拂素寫晴窗亭亭玉一雙蒼龍雷喚醒風雨遍湘江畫蘿蔔髙氏賢兄弟常將備夕餐如何清列士今作畫圖看畫菘菜老圃青青甲平生味飽諳本無食肉相豈是厭肥甘枯木竹石青天騰一蛟白日臥雙虎何人歌竹枝遙隔瀟湘浦小畫逺水吞天碧危峰拔地青何由雲樹底揮麈坐茅亭又翠黛浮晴漢虬枝立暝煙回舟不用楫江上水吞天靜樂軒為修江向自誠作清心如止水一月印當中誰道芭蕉雨瀟瀟解惱公臨水梅為昌長老作疏花清有影止水淨無埃好似菩提樹明明照鏡臺橫忩梅同前禪忩夜虛明照見臞仙影上人對空花悠然發深省畫竹為天師題夜誦蘂珠經羣真悉下聽仙壇晨自掃拾得鳳凰翎長江萬里圖將歸武昌自賦二首長江千萬里何處是儂鄉忽見晴川樹依稀認漢陽長嘯還江國遲回别海鄉春潮如有意相送過潯陽畫梅松筠淹雨雪桃李逐風塵不有梅花樹誰回天地春又鐵石挺孤標氷霜抱貞素一笑桃李空嗟哉嵗云暮詠蟬蟬性極清髙愁吟類楚騷炎天風露薄度日亦嗷嗷題落花芳草白頭翁草長連朝雨花殘一夜風青春留不住啼殺白頭翁五言律詩汨汨汨汨在塵埃羈懷不暫開病將顔玉去愁送鬢絲來招隱慙髙蹈扶顛乏大才行藏成兩失回首有餘哀送四兄往杭後寄臨别強言笑獨歸情轉哀離魂悽欲斷孤抱鬱難開太守堤邊柳徵君宅畔梅過逢如見憶煩寄一枝來逃禪室卧病東諸禪侶髙秋多病客古寺寄黃昏野逈常疑虎天寒早閉門離愁燈下影鄉淚枕邊痕賴有諸禪侶情親似弟昆次烏繼善先生見寄韻扶杖日行吟悠然太古心風雲遺壯氣山水效清音大雅消沉久斯文感慨深幸瞻喬梓在奕葉盡成隂挽柴吏目奕世蓮花幕人稱漢吏師都緣參贊重頗覺轉遷遲雅論非三語清聲是四知猶餘前案牘長作後針規挽章處士定海人晚年好道流年驚逝水世事逐飄風卜築鄰蓬島移家類葛洪丹還金鼎伏劔解玉棺空惟有松壇月通宵貫彩虹挽修竹處士種竹人何在鄉鄰久未忘氷霜餘節操雲錦見文章散帙依朝爽移樽坐夕涼兒孫皆玉立尤足繼遺芳寄鄉親濟陽公武昌蔡啓住浙江等處行中書省參知政事誥贈三代公爵身逺鄉情重途窮客病深參苓頻在眼桑梓最關心居簡便夷俗含凄效越吟自從遭喪亂辛苦到如今登北固山多景樓風月無邊地乾坤有此樓城隨山北固潮蹴海西流眼界寬三島胸襟隘九州階前遺恨石誰復話安劉幽期何處赴幽期青林白谷陲谷虛秋氣早林茂曙光遲談罷風生麈歌闌月在巵謀身良自足何補國安危次友人張孟善承贈以詩韻去去成長往悠悠事逺遊躡雲雙短屐載月一虛舟江海魚龍夜山林鶴鶴秋誦君佳麗句慰我别離憂春日海村三首地僻囂塵逺人稀習俗淳花時恆獨往隨意踏晴春班竹過頭杖烏紗折角巾蕭然多古意何愧葛天民門巷絶輪蹄春深緑草齊風光不相負泉石且幽棲捲幔通花氣移牀避燕泥時時得佳句自向竹間題每恨韶華晚仍嗟老病催閉門花落盡隱几鳥飛回引睡書千卷消愁酒一杯平生志士氣此日孰相恢寓慈湖僧舍次龍子髙提舉韻迢遞過蘭若淹留為竹林疏鐘雲嶠逈孤燭雨忩深長嘯非懷昔狂歌豈避今秪緣諸漏盡不受一塵侵慈溪度夏報國寺寄甬東椿上人一徑野雲深僧關閟緑隂雨腥龍出澗風徑虎過林淡泊資禪味清涼養道心三生如不昧石上一來尋涵清軒為慈溪懋上人作止水才盈掬涵空有底寬玉壺秋影淨金鏡曉來寒落月斜沈白流霞淺浴丹上人方宴坐應向觀中看贈李仙姑何年蕚緑華來降地仙家花擁青鸞節香隨白鹿車清輝回雪月玄想結雲霞不赴瑤池宴桃開幾度花贈濟古舟久留句踐國同寓給孤園聊發溪頭笑何殊石上魂臥雲秋對榻敲月夜過門願奉三乘法常依兩足尊送二僧往浣花草堂度夏濟古舟新古銘二公皆浙東名僧也吟遍赤城霞行行入浣花為人無芥蒂留客有瓜茶寂寂先賢宅堂堂古佛家老懷因二妙亦欲製袈裟題宋貢士袁庸死節傳後四明人始獲鄉闈薦俄驚國阼傾丹心回日馭赤手抗天兵自可敦衰薄何煩較死生文山嘉傳在端合附髙名送定海許縣丞蛟門佐邑滿南去候庭闈雨露隨花綬雲霞避綵衣賢聲今已著色養舊無違萬里滄溟月清秋作伴歸送鄞縣鮑秀才貧病吾何有深慚鮑叔知可堪遲暮日翻值别離時霜月栖烏府風雲浴鳳池壯遊如得意音問莫教遲題湖山獨步圖為葉處士作杖屨湖山外悠然與世違水邊延月上巖際待雲歸隨鹿過樵徑看鷗到釣磯只今瞻畫像猶想挹清輝慈溪歸隱為馮子木大尹作舊隱慈溪上歸休足自怡水翻琴上曲山送畫中詩叢菊秋容淡孤松晝景遲依然對猿鶴無愧北山移題四明倪仲權處士像松間新雨過清覽出亭皋雲逐青驄馬風生白苧袍幽懷隨地逺詩興與秋髙囊錦歸時重應知從者勞題介石齋為四明倪克介作介石存中正能為逸豫防礪金緣最徑攻玉豈徒剛貞德南山配神機北斗當補天應有待五色爛文章題筠軒為定海胡處士賦種竹繞前楹年深徑節成薄雲通雨氣清夜動秋聲魚豕空遺簡鸞凰合度笙往來三徑熟不負嵗寒盟漁村書隱為四明李處士賦彼美藏修者為漁住海鄉傍沙觀鳥迹臨水映螢光舟楫須經濟絲綸擬對揚得魚供色養綵服日升堂靜樂齋為寧都鄧處士賦寂寂幽棲地無營足自怡清泉流道脈白月淨詩脾每到忘機處翻為得意時豁然成猛省太極是吾師勉濟國諸郎濟國諸公子風標各擅場青陽生玉氣白月隱珠光閥閲家聲重詩書世澤長直須同素志早為繼遺芳挽四明樂仲本先生被誣寃死京獄斯人嗟已矣吾道轉消沈文物昭前古功名困至今空山方泣玉同舍忽誣金白首號天處飛霜六月深又昔訪幽棲地論文十日還圖書花竹裏忩户水雲間一别成千載孤魂隔萬山裹雞吾老矣東望涕長澘武昌南湖度夏南浦幽棲地當門罨畫開青山入雲去白雨渡湖來石潤生龍氣川光媚蚌胎芙蕖三百頃何處著炎埃題鵠山書堂為進士奚仲英作已為蟾闕彥仍就鵠山居綵服晨供饌青藜夜照書寒香三徑小清籟四忩虛仕學俱優日承明别有廬送章彥端赴夔州太守春雪遍林皋清寒襲緼袍題詩送賢守呵凍強揮毫别思巴江永才名蜀嶺髙文翁嘉政在化俗莫辭勞送儒士伯堅赴會試天子興文治春官策譽髦魚龍爭變化麟鳳並遊遨玉殿紅雲合金門紫氣髙臚傳稱第一宫柳映恩袍寄定海縣丞張允達幽興日相關應知吏事間哦詩松竹裏問俗水雲間蜃氣煙中海猿聲月下山蓬萊常五色有待簉仙班挽繆將軍大將捐公館哀音徹帝廷殞星芒角赤馭日簡編青禮賻膺天眷佳城獲地靈唯餘馮異樹寂寞倚園亭挽唐都事十年滄海上辛苦贊戎機帷幄籌雖在轅門事已非黃金從百錬白璧竟全歸生死俱無憾千秋仰德輝客懷此生何坎壈終嵗客他鄉病骨驚秋早愁心識夜長文章非豹隱韜略豈鷹揚磨滅餘方寸還同百鍊剛病衰病骨秋增痛衰容日減華臉霞憐竹葉鬢雪妬菱花往事嗟何及歸程望轉賖少年歌舞地此日屬誰家五言古選秋蕖緑水出紅蕖清麗世無比旭日照新妝盈盈明鏡裏亦有後時者悽然抱孤蕊欲開風露寒寂寂含香死梅林書屋為四明陸秀才作陸郎好修士讀書梅屋下氷雪共清寒風月同瀟灑彈琴聊對花調鼎須待實豈無松竹交嵗晚為三益題畫竹天連翠障開雨挾銀河瀉中有淡蕩人於焉結茅舍朝漁曲水濱暮獵平林下危途策羸驂汨汨胡為者又荒荒野日低漠漠江雲冷喬林延暮光澄波浴秋影髙人千載懷乾坤一漁艇奉懷九靈先生就次其留别舊韻二首晴霞麗層霄淑景媚清曙冉冉草際煙盈盈花上露幽禽何處來飛鳴入庭樹不見心所親坐待停雲度攀桂月扶疏撫松雲陸離豈無淡蕩懷亦有幽貞期何緣對清景孤坐度芳時故人不可見新交非所知嵗晏百憂集二首嵗晏百憂集獨坐彈鳴琴琴聲久不諧何以怡我心拂衣出門去荆棘當道深還歸茅屋底抱膝梁父吟嵗晏百憂集擊節發商歌商歌未終調淚下如懸河故鄉渺何許北斗高嵯峨有家不可歸無家將奈何悼亡别時如玉人歸來死生隔日暮泣孤墳音容杳難得惟餘墳上草猶帶羅裙色湖上二首鴛鴦湖中飛還向湖中落不比薄情人天涯並海角汀鷺映湖波清白兩無愧立盡風雨寒頗為口腹纍五言長篇長嘯篇惟逺度可量惟暗燭可照丈夫窮達際安可以逆料區區井觀天擾擾管窺豹衆論徒沸騰誰能領其要韓信出袴下市井皆哄笑范雎置厠中醉客更相溺一朝佐秦漢將相無同調聲名六合馳事業九天耀平生怨與恩歷歷加顯報以馬飼故人以尉乞惡少是非姑置之獨立發長嘯挽倪仲權處士維鄞有髙士乃居城北門伯叔列茅土弟昆羅搢紳先生視富貴蔑若行空雲蕭然坐一室詩書日討論忠信化閭里孝友敦親姻用茲以殁世人亡道彌尊我昔客東海託交見天真犖犖金石義藹藹骨肉恩豈意隔生死相思勞夢魂尚憐靈鳳毛符彩備五珍每過話疇昔相對淚沾巾我悲匪兒女所感在斯文贈劉全真峨峨崆洞山去天不盈尺西挹弱水流東挂扶桑日中有學仙人眉白雙眼碧餐霞衣雲霧凝神鍊精魄獰龍及猛虎視之如蟣蝨功成朝紫皇名𨽻丹臺籍幡然汗漫遊飛行隘八極滄海重揚塵蟠桃幾結實天上與地下俯仰成陳迹歸來斂袵坐倒卷入𡨕寂萬象吾肺腑四氣吾噓吸乃知大還資不離嬰兒質蚩蚩世間人斫喪良可惜觀鄭髙士坐圖凝身危石踞屏息遊絲搖電光射玄關龍虎聲咆哮天君寂不動萬象俱來朝甘露降瓊田五色發靈苖何必入青冥然後為逍遙風泉清聽為文極禪師賦幽棲空谷中石室如懸罄坐閲造化機動靜互相勝風生萬籟隨雨過百泉應蕭蕭亂疏鐘泠泠隱清磬虎嘯山月昏龍吟海波靜上人謝聲塵悠然入深定喧寂兩俱忘是乃名真聽白雲精舍為諸暨上人作白雲何處來油然在巖岫下有古精藍凌雲起華構吐吞金碧輝隱見林泉秀常從護法龍低接噴香獸覺花映益明忍草滋逾茂髙僧亦無心怡悅坐清晝安得乘長風遍界隂涼覆法雨澤羣生普使躋仁壽贈秋月長老秋月既虛明禪心亦清淨心月兩無虧炯然大圓鏡流光燭萬物萬物咸鮮瑩倒影入千江千江悉輝映情塵苟不掃倐忽迷真性所以學道人于此分凡聖視身等虛空無得亦無證偉哉寒山翁與汝安心境戇菴鄞江張孟善氏貌古性方好直言慕王陵汲黯之為人與俗多忤因扁其所居之室曰戇菴以自况室傍别開小圃圃中無花卉蔬果之冗唯值藥數畦以資鄰里之貧病者其友西域鶴年取古史苦言藥也之遺意作戇夫治藥圃詩以貽之其詞曰小圃不盈畝逼側背江郭種藥有戇夫庵居甘淡泊參苓充服食杞菊成帷箔抱甕不辭勞荷鋤寧改樂平生慕陵黯直道盡謇諤固知逆耳言即是瞑眩藥世無狄公籠誰收治民瘼何須持方柄齟齬納圓鑿余亦種瓜人嵗晏同盤礴送赤土磯巡檢徐白任滿人生天地間忠孝理最大之子知所先秉之若圭玠小試弓刀職長懷襁褓恩由來忠藎士多出孝義門便便善辭令濟濟習容止忠孝苟不立絺繡加犬豕羡子負才氣玉立當青春一飯不遑暇志在君與親桓桓領壯夫赫赫巡大邑鴟張悉就擒鼠竊亦屏息耕桑各按堵老稚春風中瓜期忽已屇入謁蓬萊宮車騎挽莫留别我大江側臨岐欲贈言老病多慚德青雲賢路開俊乂俱登庸自此躋膴仕毋忘孝與忠題碧梧軒為胡公鼎作威鳳出羽族乃為王者瑞飛翔九千仭覽德斯一至和鳴周室興來儀舜廷治髙軒植北梧萬一幸而致慨然千載懷孰敢謂不智奈彼積石遙往來良不易先生人中鳳文章五色備肯作朝陽鳴亦足瑞斯世贈醫士樂孟傑越人有至鑑明德以為基視疾洞表裏談笑驅三尸神聖不自居託以飲上池今人重勢利晝夜營已私心志先蠱惑仁術詎能推眀哲有深誡弗治為中醫樂也孝廉士天錫仁壽資蚤嵗失所怙長懷罔極悲力學岐黃術百嵗奉慈闈朱顔映華髮和氣春熙熙因推老老意遂及親與知東鄰抱膏肓西里困瘡痍刀圭一入口沈痼忽若遺樂也無德色賢聲日四馳越人久羽化緒言百世師今古不二致樂也其勉之五言排律題竹太守兄階下新竹數竿秀色鬱然可愛索豫賦詩敬製長律一十八韻楚楚新移竹翛翛已出林渭川元接葉淇水本聨隂既忝軒墀重應蒙雨露深芝蘭方並植荆棘敢相侵有荷栽培力無慚變化心長身龍夭矯密羽翠蕭森委砌風飄錦篩庭日布金奇材仲連箭雅韻伯牙琴欵乃歌頻度平安問每臨風雲今自飽氷雪舊能任豈獨松梅友仍多草木欽琅玕擎使節玳瑁合朋簪直可扶衰老貞堪載古今釣鼇期大用引鳳壓羣音詞客題詩到幽人載酒尋煙旌朝冉冉月纛夜沈沈展席臨秋水鈎簾對夕岑清風驅酷暑一為豁煩襟逃禪室述懷一十六韻出處兩茫然低徊每自憐本無經國術仍乏買山錢故邑三千里他鄉二十年力微歸計杳身逺客心懸桃李誰家樹禾麻傍舍田鶉衣秋屢結蝸室嵗頻遷逝水終難復寒灰更不然久要成齟齬多病復沈綿俯仰衷情倦棲遲野性便延徐誰下榻訪戴獨回船恥灑窮途泣間修淨土緣談玄分上下味道悉中邊有相皆虛妄無才幸苟全棲雲同白鹿飲露效玄蟬髙蹈慚真隱狂歌愧昔賢惟餘空念在山寺日逃禪題西圃卷為蕪湖辛順中作坐閲桑田變歸為菽水謀聊從西圃隱少慰北堂憂汲月滄江曉鋤雲沃野秋新蔬和雨摘碩果帶霜收嘉樹巢烏鳥間庭下白鷗管寧金不顧季路米應求千載誰同調東陵有故侯送鐵佛寺盟長老還襄陽盟居襄陽父死方在殯遇亂奉母逃難江南餘三十年嘗典藏鑰於蔣山主武昌鐵佛寺而重興之及今道路既通乃奉母北歸而葬其父喪士大夫以為方外所未有咸作詩文美之鶴年因製五言排律二十韻附卷末襄漢揚波日江湖避地時行行隨老母處處禮名師雲水元無住風塵信所之睦州勤奉養江革備艱危掌鑰鍾山下傳燈鄂渚湄剩翻龍藏典幾詠鶴樓詩深慨叢林廢真成一木支銅仙頻閲世鐵佛重開基法几雕文具靈幡刺綵絲雲鐘晨縹眇月殿夜參差已悟無生法還興罔極悲他鄉流徙逺先壟奉遷遲澒洞今方息旋歸故可期望雲雙淚瀉計日寸心馳官柳催飛錫曇花侑奠儀既明埋玉理豈是繫珠癡定應眠牛兆毋生觸鹿疑春暉憐舊線秋露薦新祠生死俱無憾諸方起孝思靜樂靜樂者章貢處士鄧翁之齋號也翁已仙去其子尚忠尚信不忍死其親求士人詩文以詠其潛德豫重二子之事死如事生也製五言排律十韻寄之以慰其孝思云髙人嗟逝矣靜樂尚求詩豈意無為道翻成罔極悲二難勤繼述一默付希夷飲水心愈潔看山意更遲傷烏營塜日弔鶴造廬時霜露增新感煙霞遂宿期閉門春事去隱几午隂移未墜青雲志仍工白雪詞每憐司馬病深忝叔牙知慚愧無佳句緘題慰孝思歌行送武昌知縣潘公考滿依依武昌柳灼灼河陽花看花思善政折柳送仙槎樊川令尹今潘嶽下車朝夕詢民瘼三年德化藹如春政成仍與民同樂值今考績朝玉京雲開天霽飛鳬輕褒德曽聞封卓茂自古朝廷重老成河陽花武昌栁勿剪勿伐公知否邑人愛護比甘棠一嵗春風一回首鶴年詩集卷一
