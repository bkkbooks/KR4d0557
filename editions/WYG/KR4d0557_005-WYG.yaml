body:
  text: 鶴年詩集後䟦鶴年其先西域人西域人多名丁既入中國因以為姓故鶴年亦丁姓其祖父皆仕元二兄皆舉進士為顯官鶴年獨泊然布素寒士元亡歸四明與戴叔能相善尚節操有孝行叔能嘗為作傳後隠武昌山中余在武昌遇之甚相得時已老矣别後數嵗卒此集盖其卒後得之武昌鄧存誠廬陵楊士竒跋
