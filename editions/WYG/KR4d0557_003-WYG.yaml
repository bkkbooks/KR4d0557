body:
  text: 鶴年詩集卷三元丁鶴年撰四言銘行素軒三衢張君師震以清才懿行有守有為而久滯下僚不以崇卑為欣戚名其軒曰行素西域鶴年深喜其名之稱也迺為之銘銘曰素履所踐王道平平流行坎止一聽于天夏禹之憂顔淵之樂易地皆然道同天爵忠信篤敬蠻貊行焉戒心微服孔孟猶然彼美吉士力行其素屈伸利鈍随其所遇廊廟匪榮闗鐸匪卑居易君子視此銘詩復淵武當高士郭復淵氏讀書學道研覃性命之懿西域鶴年為作復淵銘以勉之銘曰沈沈止水如大圓鏡一波不生萬象交映彼美外史知止有定觀水之淵復我之性湛然虚明猶水之瑩寂然不動猶水之靜衆理具存四端隨應操之者仙念之者聖至道不煩主一持敬竹隠圖江夏奚翁隐居種竹其卒也二子伯瑄仲瑛俱以學行顯于時作竹隐圖寓其孝思以予與翁有素交之好請題其上敬製四十八字以識久要之誼云昔有君子隐居種竹截簡著書垂竿釣玉委順暮年孰繼芳躅二子秀發鬱若篬筤文章雲錦節操氷霜圖諸座右庶幾羮牆菊泉軒鄂渚甘翁引泉種菊以存晚節匡山吳先生題其軒曰菊泉西域鶴年乃為之銘銘曰英英徑菊混混原泉凌霜悅茂挾雨潺湲以香以潔併作清妍中有靜者于焉周旋采之服之愈疾引年濯之𠻳之内澄外鮮徳日以新夀日以延深存晚節慨慕先賢和歸來辭談秋水篇養素齋廣西叅議董元芳之謫戍辰陽也扁其所寓曰養素日以詩書自娛請銘于予視其所存有非世俗所能者是可無愧於銘齋矣養浩配義行素順天夙夜孜孜以師聖賢不餒於内不願乎外無入不得以直無害朂哉董子不舎三餘仕學兩優得失一如逹不離道窮當益堅終始勿渝子其勉旃附録鶴年兄名吉雅斯摩廸音字元徳至正間進士任浙東僉都元帥寄穆爾古蘇院判將軍辛苦事戎行麾下論兵總俊良沙漠蘇卿多感慨鑑湖賀老自清狂風塵滿眼青山舊天地無私白髪長萬里君親俱在念扁舟何日賦滄浪遊定水寺寄杜堯臣水紋藤簟竹方牀山閣重隂雨後凉新月梧桐秋已老孤燈機杼夜初長白魚入饌松醪熟紅稻供炊笋脯香雲樹芝泉隨處好一時清賞肯相忘題浙東亷訪知事楊仲儒先生死節卷危城經百戰幕下得真儒氷蘖存孤操風雲入壯圖竒功方破敵大節竟捐軀凛凛餘生氣千秋激懦夫題天童寺朝元閣海内兵塵已十年上方鐘鼓獨依然史臣錫號承天寵中使函香出御筵山列九龍蟠紫翠樓開五鳯出雲煙藍輿亦有登山約擬聽松風借榻眠贈陳章甫三十年前鬢未蒼曽陪宰相入鵷行解衣換酒尋常醉躍馬看花取次忙亂後已非前日夢老來那復少年狂黄冠野服新妝束稳把長竿釣海鄉秋過弟鶴年書館夜話弟兄惟我老宗族有君知萬里尚為客百年能幾時秋清妨熟寐夜靜話貞期明日匆匆别還生兩地思鶴年弟盡棄紈綺故習清心學道特遺楮帳資其澹泊之好仍侑以詩誰搗霜藤萬杵匀製成鶴帳隔塵氛香生盧絮秋將老夢熟梅花夜未分枕上不迷巫峽雨床頭常對剡溪雲竹爐松火茶煙煖一段清貞盡屬君題畫竹為董文中賦雨過蛟龍起風生翡翠寒無人知苦節落日下長安假日燕集呈席諸老半生辛苦獨天知十載鄉闗入夢思作郡正逢多事日揮毫不及少年時青衫有淚多如雨白髪無情亂若絲今日一樽諸老共臨風不醉復何辭鶴年次兄阿里沙字允中至正間進士仕翰林應奉題九靈山房圖戴叔能讀書處夢裏家山十載違丹青咫尺是耶非墨池新水春還滿書閣浮雲晚更飛張翰見機先引去管寧避亂久忘歸人生若解幽棲意處處林丘有蕨薇題餘姚州判官葉敬常海隄遺卷潮汐東來勢蹴天一隄横捍萬家全陵遷谷變人誰在海晏河清事獨賢曉日山川神禹跡秋風禾黍有虞田河渠他日書成績應並宣房與代傳題鍾秀閣為東湖古鼎銘長老作檻外澄湖平不流窻間疊嶂屹將浮煙霞五色錦屏曉風月雙清瑶鏡秋簷蔔濃香吹法席芙蓉涼影蕩仙舟結巢擬傍雲松住迴首朝簪愧未投鶴年表兄吳惟善樊川人寄武昌諸友黄鵠山前漢水濆一時英俊總能文金釵佐酒年俱少銀燭抄書夜每分鴈杳魚沉勞逺思狼貪羊狠絶前聞兵戈故國知誰在目斷西南日暮雲寄東海鶴年賢弟鶴臯東望接三山海上羣仙日扣闗虎守月爐丹煉就龍吟霜匣劍飛還故園松菊餘三逕老屋煙霞恰半間為問林泉逃世者如公今有幾人閒題扇寄友拾得瀛洲月一輪氷紈初剪瑩無塵提攜不用深相憶滿握清風即故人小遊仙桂殿瓊樓露氣清吹簫者是董雙成無端又作人間夢風雨蕭蕭雞亂鳴又河海無聲海月寒長鯨吸浪洞庭乾一聲鐵笛風雲動人在危樓第幾欄鶴年詩集卷三
