伯昇起予沉疴合府諸彦為詩稱謝故人素擅岐黄術今我兼承管鮑知髙義百年存古道沉疴一旦起神醫杏林春早繁花合橘井秋深美實垂最愛相酬無長物數篇清絶盛唐詩常秀軒為姻姪唐仲節賦脩竹疎松一徑存故家徳澤久培根嵗寒並勵氷霜節春永均霑雨露恩翠盖垂珠知結子錦棚抽玉見生孫要知奕葉承家慶多在詩書禮義門送詹光夫之雲南通海校官儒冠跋涉敢辭勞直以詩書化不毛盛世用文興禮樂黌宫接武貢英髦密依壇杏登絃誦獨對山茶設醴醪㑹見毓才功第一歸來宫錦賜新袍得亡友郭至善醫士哀問二首不知大夢赴華胥猶向來人問起居藥圃春深餘故植芸窻日永列遺書獨憐宿草迷荒塜安得生芻致倚廬咫尺無由親執紼深慚千里巨卿車俊骨英才孰與儔華星明月照清秋重傷賈誼才無敵深慟顔淵徳最優過墓自當留寳劔濟河誰復共僊舟極知脩短俱天命老淚無端似水流寄鉉宗鼎時在定水蒲菴閒居定水寺號雙峯在海濱地名鶴臯開士幽棲何處是一菴瀟灑傍雙峯彈琴夜和鳴臯鶴呪鉢朝降渡海龍萬里思鄉瞻北斗十年學道事西宗故人海内皆星散憶爾山中氷雪容夜宿染上人溪舎雲去禪闗户牖空清溪碧樹有無中倒涵天影魚吞月逆戰秋聲犬吠風見性本圖先作佛勞形翻愧早成翁杜陵老去歸無計來往那辭惱贊公昏瞶一首録呈靈淵老師求印方老來昏瞶底須嗟聲色雙忘也自嘉秋枕不驚風外葉春杯長對霧中花海師唱道禪多悟張籍題詩字半斜幸有靈臺長不昧目觀耳聴總無差獨松菴獨撫長松晝掩扉嵗寒髙節想無違茯苓春暖供齋鉢蘿薜秋清製道衣雲滿碧山龍起蟄月明滄海鶴來歸淨瓶滿貯菩提水恐有人叅第一機題建昌王子中橋亭八景橋亭風景洞天如中有儒仙舊隱廬春漲挼藍涵蝶蝀澧陂春漲内有石梁長橋曉嵐滴翠濕芙蕖龍漈朝嵐内有長山峻嶺受詩華巘浮丘館中華翠巘峯頭有浮丘伯仙字說劔香爐許令居香爐紫煙峯頭有許旌陽仙居雲外懸崖飛屐上天寳懸崖雨中沃壤帶經鋤田東暮雨踈鍾鯨吼霜華重聖容僧鍾長笛龍吟月色虛雲原仙笛老我塵寰懐勝景追逰早晚命巾車送進士都堅巴哈出宰三山龍沙公子龍頭客錦繡胸襟玉雪顔一日蜚英驚四海九天承寵宰三山花前封印青春醉槐下鳴琴白晝閒守令近民勤聖念早須報政五雲間觀太守兄昌國勸農東皋風日媚新晴太守躬耕曉出城裊裊雙旌穿栁過蕭蕭五馬踏花行扶藜父老陪諮訪騎竹兒童主送迎豈意兵荒南北遍化行滄海獨昇平頒厯腐儒避地海東偏鳯厯頒春下九天載拜帝堯新正朔永懐神禹舊山川廟堂久託君臣契藩閫兼操將相權只在忠良勤翊戴萬方行覩至元年勉戴𤣥學才名籍甚冠時髦愛爾青牛氣獨豪千里共誇騏驥足九苞爭覩鳯凰毛月中把桂雲生履天上看花日映袍宦逹每由稽古力夜窻燈火莫辭勞贈陳章甫少年仗劔逰京國豪氣崢嶸壓五陵栁緑御溝春飲馬草黄上苑曉呼鷹日邊冠盖人人識雪後舟航處處乗白首歸來尋舊隱髙談驚座羡君能寄西湖林一貞先生錦繡湖山世絶稀東風不放賞心違芙蓉楊栁臨清淺佛刹仙宫繞翠微畫舫載春天上坐紫騮䭾醉月中歸髙情獨有林和靖門掩晴空看鶴飛送潘允章歸天台定省從師久客鄞江館重憶庭闈問起居五彩早成萊子服一經今授伏生書落花芳草春停騎斜日孤雲暮倚閭暫爾南歸仍北上萬言敷對玉階除次張撫軍韻二首先公昔鎮西南日幾拜殊恩出御筵桃李門牆賓客盛芝蘭庭砌子孫賢百年遺愛齊民服一代鴻勲信史編最是撫軍能接武桃燈夜讀十三篇堂堂雄略靖三邊亹亹清談動四筵夜月轅門嚴士卒春風幕府集才賢詩宗李杜元無敵書法孫吳每自編白首栖栖江海客逺煩馳寄錦雲篇寄張廷言千里闗河阻重兵兩煩書札見深情故人我久知張禄處士時多忌禰衡閱世正當思豹變出闗何必待雞鳴莫嗟才大難為用天運行將返治平送人歸故園故人休道已休兵客裏那堪送客行老去别懐殊作惡亂餘歸計倍闗情孤村月落羣雞呌絶塞天清一鴈横到日所親如見問浪遊江海負平生次東軒居士韻珠玉新詩照士林長城寧畏短兵侵春雲有態時時變秋水無㾗岸岸深洛下才名推獨步越中山水喜重臨别來嵗晚偏相憶誰折梅花慰渇心丙午十一月二十四日夜夢回書事抱病經時不出門存亡一一念諸昆兵戈隨處斷消息風雨終宵勞夢魂竹下題詩雲起硯花前度曲月當樽每因舊事増新感獨對寒燈拭淚㾗寄胡敬文縣尹胡遂初真人海上漕舟比還得應奉兄書云湖廣親兵後僅二公寄以詩湖北衣冠藹士林十年兵革盡消沉崑岡火後餘雙璧錦里書回扺萬金鳬舄趨朝天闕近霓裳度曲月宫深誰知海上垂綸者去國長懸萬里心奉寄表兄白留守兼呈楊亷使白髮先朝舊從臣懸車徧看五湖春養恬髙節矜持重優老濃恩奉拜頻每有緇黄談幻化可無朱紫問經綸座中不遇楊開府肯把平生對客陳海巢海上巢居海若降三山眼底小如矼已攀若木為華表更立榑桑作翠幢蛟室夜光晴燭户蜃樓秋影冷涵窻鷦鷯夢斷無因到唯有同棲鶴一雙太守兄遺紙帳仍贈以詩次韻奉謝湘娥剪水霜刀匀虛室生白無纎氛壺中但覺風雨隔殻裏豈知天地分蟾光夜明楮葉露蝶夢春逺梨花雲恍然置我銀世界縱有瓊瑶難報君渡鄞江後寄陸時敏陳可立小艇横江㨗似飛故人凝睇送將歸過山殘照明紗帽渡水浮雲亂苧衣沙鳥水鷗同泛泛岸花汀草各依依風塵來往慚經濟擬着漁蓑坐釣磯寄張左瞽張生脫略今有年食無梁肉眠無氊丈夫既與世不偶貧賤肯為人所憐齊眉已喜孟光敬剪髪况聞陶母賢拂衣歸來好共隱與爾並耕沮溺田别四明親友烏季善余伯雄諸公携詩載酒祖道鄞江之上賦此以謝之春雨晴時春水生春風摇蕩别離情栁條弄色已堪把鶯語怯寒猶未明白雪翻聲歸錦軸紫霞流影入瑶觥當江打鼓放船去長揖同袍好弟兄遷葬後還四明途中寄武昌親友浪逰吳越任荆湘來往那辭道路長篋内有書慙歴國邸中無綬敢誇鄉潮生别浦江雲白塵起征途野日黄若問離人行役苦十宵九夢在瀧岡九日登定海虎蹲山東海十年多契濶西風九日獨登臨天髙雲静鴈初度水碧沙明龍自吟籬下菊花憐我瘦盃中竹葉為誰深憑髙眺逺無窮恨志國懐鄉一寸心腐儒落魄乾坤一腐儒生逢四海日艱虞異邦作客歌黄鳥空谷懐人詠白駒豈有縱横千七國亦無詞賦擬三都時危那敢辭貧賤苐恨長年走畏途避地避地長年大海東蕭條生事野人同深春耒耜孤村雨落日帆檣逺浦風那得文章偕隱豹聊將音問託歸鴻平生自恨無仙骨五色蓬萊咫尺中異鄉清明十年澒洞家何在萬里清明客未歸雨僽風僝花亂落泥融水暖燕交飛煙生榆栁推遷速雲鎻松楸拜掃違旅鴈盡回音問斷側身長望淚頻揮卜居二首木石為交不背盟卜居應得愜幽情雨苔蘸水溪魚上風葉墮階山犬鳴習懶已成忘盥櫛避喧漸逺絶逢迎義肥百戰收全勝特為耽詩太瘦生小村雖僻俗敦龎背負崇山面俯江月冷靈虬潛絶壑雨晴仙犬吠流淙緼袍御臘辭紈袴瓦甕浮春謝玉缸偶為清羸聊採藥亦非竊比鹿門龎寄昌國濟汝舟長老先兄太守嘗題詩于方丈西江禪伯住東溟境接蓬萊地最靈析木秋濤浮座白扶桑朝影拂簷青已無鶴近雲間錫祇有龍聽月下經李白騎鯨天上去題詩誰復扣巖扄寓奉化寺寄菩提寺主菩提嶺外空王寺丹磴行穿虎豹羣萬壑濤聲巖下瀑千峯雨氣屋頭雲海龍送水金瓶貯天女懐香寳鼎焚慚愧無縁塵土客朝朝鐘鼓下方聞奉寄恕中韞禪師曽向名山識異人心如木石氣如春坐禪霜葉秋埋膝行道天花日繞身有鉢相傳元是幻無錐可着本非貧惟餘潭㡳中秋月對寫龍峯面目真時留龍峯傳燈寄龍門海禪師予自海東初回龍門嘗招予入社故有還家鶴之喻也曽向龍門俯急流泰山如垤海如漚學仙漫比還家鶴作佛須看露地牛逺岫孤雲歸薄暮澄潭一月印清秋葛川舊有三生約擬䇿枯藤到上頭寄東湖濬天淵長老伯仲平湖一鑑涵空明千鬟照影羣峰晴慈雲或將花雨過幽泉盡學松濤鳴清猨對户忽長嘯老鶴下階時獨行何人最得此中趣無着天親好弟兄送鍠聲外侍者還定水寺侍者乃見心長老入室髙弟侍者還山修白業何須門外問三車微塵有相皆成幻大道無岐直到家月滿秋巖收桂子雪消春澗采蒲芽阿師𢎞教成獅子佇見傳衣後代誇寺有天香室蒲菴故云送信立菴長老住靈巖寺寺即吳王避暑宫也山中古跡有香逕硯池涵空閣上人駐錫靈巖寺正是諸天聽法時日下幡幢朝旎旎雲間鐘鼓書遲遲殘紅掩冉迷香逕空翠溟濛落硯池不盡平生懐古意涵空閣上一題詩題東湖青山寺古鼎銘長老鍾秀閣手開樓閣貯羣經面對湖山衛百靈玉鏡夜寒通沆瀣翠屏秋淨倒空青避煙鶴起簷間樹行雨龍歸几上瓶我亦逃禪雲水客便應蕭散共松扄題二靈山房在東湖為濬天淵長老作寳刹憑虛户牖開羣峰北走水南迴六鼇夜涌金銀闕九鳯朝翔紫翠堆日靜雲間飛鍚下月明天上渡杯來談𤣥每就巖房宿最愛三車有辨才題澹然齋為慈溪潤上人賦寂寂禪扄掩晝隂阿師道味此中深一塵不涉氷霜操萬境俱空水月心駐屐寒香生小徑捲簾秋色上踈林莫愁客至無清供𤣥酒盈樽好共斟題悠然軒為慈溪敉上人賦香消靜室定回時真趣忘言祇自知雲淡風輕天蕩蕩鳶飛魚躍晝遲遲傳來西竺元無法坐對南山或有詩不是淵明來入社百年誰與共襟期清勝軒為姑蘇潤上人作繞屋松杉手自栽重隂長日䕶蒼苔一溪窈窕花間入三徑參差竹下開夜半霜鍾寧假莛秋深月鏡本無臺主人定起焚香坐何處扁舟棹雪來些子景為平江韞上人作尺樹盆池曲檻前老禪清興擬林泉氣吞渤澥波盈掬勢壓崆峒石一拳彷彿烟霞生隙地分明日月在壺天旁人莫訝胸襟隘毫髪從來立大千半村為姑蘇信立菴禪師作菴居背郭稱踈慵道韻清孤野趣濃花徑縈回通小市竹窻窈窕納遥峰五更風􅉍嚴城角半夜霜清古寺鐘昨日隣翁告東作四郊春雨起降龍雲石為貞長老作坐石看雲絶百非空山終嵗澹相依卧龍春煖潛噓氣伏虎年深不振威已向諸天陳瑞彩更從歴刼拂銖衣驀然觸着無拘礙蕩蕩乾坤自在飛白石為琦公宗師作雪色雲根出翠㣲堅貞不與道心違塵空自比神仙鏡路滑誰叅佛祖機豈為礪金希世用都縁韞玉發山輝㸃頭黙契生公法絶勝商歌歎短衣寓東湖二靈寺二靈古稱山水窟興來獨往亦一竒扣舷時聞小海唱奪卷復覩長江詩月中聽鶴坐不寐煙外盟鷗歸每遲桃花流水儻得路便應黄髮為漁師次義上人韻𡨕棲九隴傍雲松茗盌熏爐取次供月滿長空秋放鶴雨昏大海晝降龍病中普施諸方食定裏長聞上界鐘明哲古來多玩世不妨隨處舞三笻再用前韻贈祖庭興上人匡廬攬秀昔巢松水色山光左右供日下竒峰金作鳯雲間飛瀑玉為龍撲簾空翠霑晴几拍枕寒濤隠暮鐘從此胷中富丘壑乾坤萬里一吟笻悼湖心寺壁東文上人祗林一葉隕秋霜回首滄洲淚兩行几上殘經塵已暗篋中遺稿墨猶香雲迷圓澤三生石月冷維摩十笏房想像清容何處記寒梅的的竹蒼蒼山居詩三首呈諸道侣一榻東軒逈絶縁寒巖枯木共忘年雖非悟道龎居士豈是耽詩賈閬仙禪定儘教崖石坐法音都付澗湍傳晴牕終日無他伎只辦飢飡與困眠日日看山眼倍明更無一事可闗情掃開積雪巖前坐領取閒雲隴上行不共羽人談太易懶從衲子話無生劃然時發蘇門嘯遥答風聲及水聲懶散形骸不自持黄冠聊