body:
  text: 鶴年詩集卷二元丁鶴年撰七言古詩黄鶴樓半空金碧何代樓僊人鶴駕曽一遊雕檻看雲楚山曉珠簾捲月湘江秋樓前雲月長無恙禰賦崔詩角清壯西風忽動庾公塵僊人仍歸九天上植樗軒為天台吳處士賦徂徠蒼松幹嶧陽孤桐枝矯矯卧龍節娟娟棲鳯姿桐中琴瑟松棟梁采之斵之生輝光明堂清廟即登用回首故山雲路長鳯凰不來龍亦去樗散當軒承雨露贈𤣥溟鍊師神僊中人毛外史方瞳深碧虬髯紫了知大道本無為况是谷神元不死偶因救旱驅𤣥溟倒瀉銀河如建瓴功成不居拂衣去洞庭𣺌𣺌君山青贈相工宋忠臣姜才之孫姜奉先徳祐忠臣好孫子爛爛目光巖電紫人間富貴等浮雲𤨏𤨏何煩掛唇齒灧澦險蜀道難曵裾傍人多厚顔留取乾坤雙老眼夕陽牛背看青山紫芝山房為四明處士夢紫芝生於别野因置墓廬先翁胸中有丘壑豫築園亭向山郭清宵忽夢紫芝生地靈獻瑞真佳城只今諸孫仍肯構風姿􅈌􅈌如芝秀一門朱紫自此升始知吉夢為休徴始知吉夢為休徴千載無慚下馬陵雙溪草堂為叙南游克成先生作堂之側有琴盖山雙溪出其下繞堂而來曰琴曰盖皆名山雙溪衮衮來其間玉龍齊驅繞地軸青鸞並翥朝天闗草堂先生足風致擊空明兮攬空翠英才樂育貢春官始識先生仁且知贈戴原正戴生眼如電讀書夜忘眠清晨盥櫛罷起居慈母前母身康寧子心喜讀書還向書帷裏綴文調饍秋復春鳯凰符彩騶虞仁天心一回四海平治明堂掄材清廟需器棟梁瑚璉寧汝棄離鸞篇為四明張孟善祖母祝節婦而作孤鳯病且死聘鸞以為偶引頸嗚鳴託其後鸞對以臆肯以首惡鳥啄其雛飄風撼其巢伏育補葺鸞不辭勞雛日以長能反哺巢日以廣多牖户天錫夀考既和且平每一對鏡猶復悲鳴始終徳義俱無愧乃知鸞鳯所以為世瑞胡節婦一自失良人年年不見春常時折花處青苔滿行路即今垂老百事非篋中惟有嫁時衣姑終養子成立望夫差勝山頭石樂節婦荼蓼未為苦薑桂未為辛纍纍辛苦者無若未亡人欲隨世苟活生則同室死同槨欲殉夫並殂阿婆方老兒方孤朝養姑暮教子泉下良人猶不死送周侍郎定江淛賦稅還大都代杭城父老作戈甲三邊静車書四海同時平尚文治䇿士明光宫龍沙公子清且美玉立芙蓉照秋水前席才名賈誼賢出闗氣槩終軍偉恭捧帝符臨下方卿雲五色分天章星軺小駐武陵驛炎海六月生清凉宣朝廷徳意問閭閻疾苦遊民亦占籍編户悉按堵力役均平賦斂輕去者謳歌來鼔舞觀風采謡乃使之職任賢使能惟帝之徳目擊盛事豈容緘黙乃歌曰生逢舜日當堯天經營内外皆英賢八十衰貧百無補茅簷擊壤歌豐年題餘姚葉敬常州判海堤卷補先兄太守遺缺隂霓夜吼風雨急坤維震蕩𤣥㝠立桑田變海人為魚葉侯訴天天為泣侯奉天罰誅妖霓下平水土安羣黎嶙峋老骨不肯朽化作姚江捍海堤海堤蜿蜒如削壁横截狂瀾三萬尺堤内畊桑堤外漁民物欣欣始生息潮頭月落啼早鴉柴門半啓臨漚沙栁根白舫賣魚市花底青帘沽酒家花栁村村各按堵世變侯仙倐成古侯雖已矣遺愛存時聽叢祠咽蕭鼔人生何必九鼎榮廟食貴有千載名君不聞一杯河水决瓠子沈馬親勤漢皇祀又不聞一帶江波泛蜀都刻犀厭勝秦人愚江平河塞世猶駭何况堂堂障滄海論功不啻濟川才砥柱東南千萬載嗚呼只今四海俱横流平地風波沈九州蒼生引領望援溺州縣有官非葉侯州縣有官非葉侯禦災誰復憂民憂書掲秘監所撰李處士墓銘後為孝子李思親作亭亭髙岡松上有雙棲烏朝出營其巢暮歸哺其雛雌雄和鳴尾畢逋巢成雛長烏雙殂月明夜静雛影孤南飛繞樹聲號呼西溪之滸南山之隅啣土為墓口卒瘏蓬萊老仙憫其慈孝俱錫以五彩鳯凰羽徑寸驪龍珠光芒晝夜燭墓廬哀哀既慰情始舒振迅羽翮思天衢故巢嵗晚牖户虚飄颻風雨無時無纒綿補葺良艱劬君不見秦家桂樹空扶疎髙枝却使䲭梟居環翠樓歌為餘姚道士梁公作大山摩穹霄小山飜洪濤或翔丹穴鳯或舞寒江蛟奔騰起伏竒觀不可狀雲錦屏風金碧障中有仙家太古壇鳥啼花發春自閒子晉鸞笙乘月過王喬鳬舄凌雲還環翠樓開紫霞裏更揖雞峯朝舜水千巖秀色傍牕浮萬壑濤聲從座起煙消日出天溶溶玉壺倒插金芙蓉鈎簾相對坐長夏洒然氷雪生心胷君不見天台嵯峨四萬八十丈若非飈車羽輪那得上又不見終南盤亘中原五百里天梯雲棧懸絶那可履何如羽人髙居環翠樓調笑日月輕公侯仙韶靈響每坐聽日觀霞城時卧遊還丹鍊就顔如玉讀書學道日不足琅函金檢五千言錦帙牙籖三萬軸星為冠兮霓為裳或㕘麒麟翳鳯凰翩翩上遊白雲鄉手把絳節朝紫皇鈞天九奏賜霞觴醉乘冷風還下方眼空四海小八荒層樓棲真夀而昌此名此境孰敢當藍山道士身姓梁送僧净皓書童正思所作詩序後童郎豪爽士平生少許可獨於皓上人珠璣發咳唾上人學法英妙年㕘遍諸方文字禪鐵鞋踏破石頭路教外方知别有傳童郎我同道上人我同鄉相逢江上折官栁離思悠悠江水長送鐵佛寺益公了庵朝京遊浙世尊出西域教化極東土大道本無為盛徳人所慕只今滅度二千年授經弟子如親傳我生懶僻苦貪佛或謂三生有勝縁武昌鐵佛古名刹兵燹荐臻孰承乏益公崛起振宗風至味㗖人如嚼蠟相逢一笑即相親下榻東軒忘主賓薫爐茗椀坐清夜從容軟語温如春曉來别我朝京國短䇿輕包適吳越吳越山水天下竒寳坊金刹皆人傑公今叅訪必遇人六根一掃無纎塵錢唐潮音華頂月獨露堂堂見本真從此平生大事畢頓覺身心樂無極踢翻大海水逆流半夜中天出紅日我有故人僧中雄不逺千里來詩筒煩公問訊向何處説法今留兠率宫送蔡士亷舎人奔訃還四明公家東海濵我昔共鄉縣今同寓鄂渚十年不一見公從藩府典禮儀入侍須早出毎遲不將汎愛要鄉譽直以孤忠結主知雪松貞操寒逾勁氷蘖清聲老更馳府中諸彦皆人傑政事文章稱二絶重公質朴古人風平揖下堂腰罄折身名俱泰心獨悲甘㫖親庭千里隔一朝海鶴寄雲椷阿翁已作蓬萊客仰觀喬木戰飄風五内分崩面深墨我聞往弔始見公我足蹣跚公髪白相看話舊重咨嗟少日風流那復得花明春泛越王湖月皎秋尋賀公宅賞花弄月秋復春詩酒清狂多故人直倚青年驕白日豈知碧水揚黄塵從此東西各星散我憶同遊如夢幻秋風江上漫思鱸夜雨闗河愁聽雁公當大事賜告歸片帆東下孤雲飛里中長老久相待一見喜極還沾衣儻問題詩者誰子道即遼東丁令威送奉祠王良佐奔訃還兖城兖為禮義鄉自昔多名士佐也㳺夏徒力學能崛起三冬文史富才華萬言入對天王家騎蟾秋折廣寒桂走馬春看長安花承恩筮仕御史府風生臺閣膺僉舉雅知嚴敬授祠官奉禮山川來大楚祠宫清暇日有餘焚香危坐讀父書門外猶維桓典馬釡中屢出萊蕪魚嗟予老病衡茅下時人棄置如土苴多公髙義數相過茅塞心胸賴陶瀉霜風一夜吹庭闈椿萱並瘁色養違再拜天顔零涕出千里看雲匍匐歸佳城已卜牛眠地屏立泰山帶圍泗種松畚土展孝誠傍水依山礪仁知知明仁熟政乃攻終䘮還謁蓬萊宫致君堯舜付公等佇令四海回淳風五風十雨年屢豐吾何幸為田舎翁送奚仲瑛進士服闋朝京奚郎健筆凌髙秋排雲直上蟾宫逰一枝丹桂許先折歸來兩袖天香浮早年掄材服官政百里秋毫歸藻鏡躬承天語佐夏官幕下清談烽燧静家書忽報丁内艱讀禮還依孔子山教育英才樂人樂一旦徴書到巖壑鯤鵬從此徙南溟鳯凰仍舊巢阿閣望雲思親圖為王大使作山人愛雲不離山巢居只在雲松間枕泉漱玉弄明月此心直與雲俱閒逹官愛雲雲作侣平步青雲稱髙舉天瓢一滴慰蒼生大旱用汝為霖雨王公出處與此二者殊十年逰宦感離居衣上猶存慈母線手中長把嚴君書日日看雲不遑暇為有吾親舎其下恨身不得逐雲飛却寫飛雲入圖畫公餘展翫凝心神見雲如見吾雙親卷圖仍寄吾親舎永奉髙堂長夀身狄公盛事王公繼今古孝思同一致竹林書屋王郎髙標絶塵俗牽茅自結清風屋屋中充棟積古書屋外循簷種修竹離離實垂珠森森笋抽玉鸞鳯食有餘虎豹文亦足時時把書卷自向竹下讀禮義深服膺聖賢常在目王郎學道今有年半是臞儒半是僊清脩酷與此君似中通外潤直且堅平生不作桃李媚嵗寒風節恒凛然不隨沉湎唐六逸不效曠逹晉七賢浄掃仙石壇焚香究𤣥𤣥客來不交語共坐蔚藍天蒲輪他日訪幽側以道匡君流惠澤功成太史不一書却汗青青為簡䇿律詩兀兀數莖白髪鏡中新兀兀窮年愧此身萬里雲霄雙倦羽千尋江漢一窮鱗望鄉薄暮憑西日去國中宵禮北辰客路漸遥身漸老此生何以報君親勞勞閶闔排雲事已休勞勞猶耻為身謀數莖白髪未為老一寸丹心都是愁燕代地髙山北峙荆揚天濶水東流英雄已去空形勝劔氣中宵射斗牛元夕燈火樓臺錦繡筵誰家簫鼓夜喧闐光移星斗天逾近影倒山河月正圓金鎻開闗明似晝銅壺傳漏逈如年五雲不奏霓裳曲空使揚州望眼穿脫太師淮海重聞斧鉞臨一時黎庶盡傾心雷霆聲播天威逺霖雨恩添帝澤深暗室有蠅汚白璧明廷無象鑄黄金風塵未息英雄死坐對江山慨古今靳公子中朝公子多才俊瀟灑風塵獨靳侯白鴈久無天上信黒貂漸敝雪中裘虛堂簾影遲遲晝别館燈光淡淡秋到手深盃湏􅇵飲醉鄉消得古今愁故宫人粉愁香怨不勝情強整殘粧對老兵别殿金蓮餘故步後庭玉樹變新聲眼穿鴈字雲連塞夢斷羊車月滿城天上桃開王母去世人誰識許飛瓊别帽雲様飄蕭月様團百年雄麗壓南冠黄金綴頂攢文羽白璧垂纓間木難刺繡尚期平敵壘簪花曽夢舞仙壇一從吹墮西風裏誰念蒙塵白髪寒雪後泛東湖雪後湖山玉作圍小舟乘興弄清輝貪看月裏鸞回舞不覺風前鷁退飛雲母屏空春閴寂水晶宫冷晚霏微仙家一笑乾坤老誰馭瑶池八駿歸梧竹軒為鳯浦方氏作鳯鳥曽聞此地過至今梧竹滿丘阿政懐剪葉書周史却恨翻枝入楚歌金井月明秋影薄石壇風細晚凉多中郎去後知音少共負竒材奈老何九靈山房圖為戴先生作九靈别業何年到聊作新圖寄所思幽谷白雲晴窈窕髙簷翠樹曉參差輞川已入王維畫韋曲仍傳杜甫詩咫尺相望成萬里卧游心事許誰知二靈寺守嵗守嵗山房逈絶縁燈光香灺共蕭然無人更獻椒花頌有客同㕘栢子禪已悟化城非樂界不知今夕是何年憂心悄悄渾忘寐坐待扶桑日麗天元旦寄朝真宫諸道侣窮隂殘臘喜全消淑景新正覺倍饒一氣挽春回厚軸五雲扶日麗層霄媚時久厭銀幡巧卜嵗深期玉燭調最愛羣仙持綘節朝真不憚九天遥暮春感懐二首杜宇聲聲喚客愁故園何處此登樓落花飛絮成春夢剩水殘山異昔遊歌扇多情明月在舞衣無跡綵雲收東皇去後韶華盡老圃寒香别有秋四十無聞懶慢身放情丘壑任天真悠悠往事杯中物赫赫時名扇外塵短䇿看雲松寺晚疎簾聽雨草堂春山花水鳥皆知己百遍相過不厭頻奉寄王宣慰兼呈九靈先生别館新成足宴逰珊珊環珮總名流獨推南郭為髙士共識東陵是故侯天上鸎花三月夢人間風雨五更愁行藏盡付浮雲外爛醉豐年稌黍秋奉寄九靈先生四首先生嘗為予作傳挾海懐山謁紫宸擬將忠孝報君親忽從華表聞遼鶴却抱遺經泣魯麟䘮亂行藏心似鐵蹉跎勲業鬢如銀萬言椽筆今無用閒向林泉紀逸民花栁村村接海濱擕家隨處避風塵衣冠栗里猶存晉雞犬桃源久絶秦對坐青山渾不厭忘機白鳥自相親也知出處闗時運豈但逃名效隱淪