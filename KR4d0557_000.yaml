  text: 欽定四庫全書集部五
  hash: sha256:91d391b03400458fe4b5406ed6606e69862a8e4f767c40fe8478f37cc3ae4e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0557_WYG_000-1a, image: WYG1217/WYG1217-0493a.png}
body:
  text: 丁鶴年集别集類四元提要臣等謹案丁鶴年集一卷元丁鶴年撰鶴年字亦曰鶴年蓋用孟浩然字浩然例也色目人本世家子遭亂不求仕宦篤尚志操兼以孝聞烏斯道戴良為作撰皆以申屠蟠擬之元亡避地四明後歸老武昌山中明史文苑傳附見戴良傳末其詩本名海巢集此本題丁鶴年先生集不知何人所編末附有鶴年長兄浙東僉事都元帥吉雅摩迪音原作吉雅謨丁今改正詩九首決兄翰林應奉阿里沙詩三首又鶴年表兄樊川吳維善詩五首亦不知何人所續入也鶴年既絶意於功名惟覃思吟咏故所得頗深尤長于五七言近體往往沈鬱頓挫逼近古人無元季纎靡之習至順帝北狩以後興亡之感一託於詩悱惻纒綿眷眷然不忘故國瞿宗吉歸田詩話所稱行蹤不異梟東徙心事惟隨雁北飛句及逃禪室與蘇生話舊一篇可以知其素志宗吉又稱其梧竹軒詩謂其時作者已滿卷此詩一出皆為斂祍今考其詩中二聫堆砌無味徒以起二句用鳯凰事以栖梧桐食竹實關合末二句用蔡雍事以焦尾桐柯亭竹關合頗為工巧耳以是求鶴年之詩失之逺矣乾隆四十三年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鶴年詩集原序武昌丁鶴年先生以詩鳴湖湘間膾炙人口久矣余友四明章琦廷玉典教斯邑以其板廢不存將重刻以興起之前杭州府學教授唐公仲節於先生為契家子自武昌來不惟重先生之詩而且重廷玉之斯舉蓋義舉也徵余序其所以於首簡余聞言之精者謂之文而詩於文又其精者也必其一字一句瀟灑出塵使人雋永之不忘斯足謂之詩况先生負俊爽之才加以用心之專宜其為詩名擅於時至流落人間人得之以膾炙諸口則何啻若得玄霜紺雪以疏滌其腸胃哉此先生之詩固不可不傳也抑孰知修廢舉墜則又為君子盛德事大抵天地間前人作之於前者必賴後人述之於後彼或已成之事無後之人以維持之則幾何不至於泯沒無聞哉若廷玉於先生之詩能興之於既廢之餘則其用心之仁誠可謂之不愧為君子也已且余聞廷玉蒞教斯邑其造就人才薰陶涵育愚者必欲使之明柔者必欲使之強致鼓篋而來者無不得其所依歸蓋亦莫非推是心而然也噫廷玉其賢矣哉夫廷玉蓋名公子厥父敬先讀書惇行嘗尹隆平有德及民雖終至今民猶思之不置厥兄廷璧厥弟廷琰亦皆以明經顯咸擁師席名隱隱起縉紳間余以昔與廷玉季父沐陽教諭魯先交故廷玉昆季為之往來頗密每重其一門父子兄弟之賢方念暌離之久欲一胥晤而不可得適唐公有是請則余又烏得不喜廷玉之有此義舉而樂為序其集之首云蕭山魏驥書昔者成周之興肇自西北西北之詩見之於國風者僅自邠秦而止邠秦之外王化之所不及民俗之所不通固不得繫之列國矣我元受命亦由西北而興西北諸國若回回吐蕃喀和爾伊囉勒昆唐古爾輝之屬往往率先臣順奉職稱藩其沐浴休光霑被寵澤與京國內臣無少異積之既久文軌日同而子若孫遂皆舍弓馬而事詩書至其以詩名世則貫公雲石馬公伯庸薩公天錫余公廷心其人也論者以馬公之詩似商隱貫公薩公之詩似長吉而余公之詩則與隂鏗何遜齊驅而並駕他如髙公彥敬巙公子山達公兼善雅公正卿聶公古柏斡公克莊魯公至道王公廷圭輩亦皆清新俊拔成一家言此數公者皆居西北之逺國其去邠秦蓋不知其幾千萬里而其為詩乃有中國古作者之遺風亦足以見我朝王化之大行民俗之丕變雖成周之盛莫及也鶴年亦西北人其視數公差後起家世以勳業著而鶴年兄弟俱業儒伯氏之登進士第者三人鶴年乃泊然無意於仕遭時兵亂逃隱海上邈不與世接凡幽憂憤悶悲哀痛苦之情一於詩焉發之觀其古體歌行諸作要皆清麗可喜而注意之深用工之至尤在於五七言律但一篇之作一語之出皆所以寓夫憂國愛君之心愍亂思治之意讀之使人感憤激烈不知涕泗之橫流也蓋其措辭命意多出杜子美而音節格調則又兼得我朝諸閣老之所長故其入人之深感人之妙有非他詩人之所可及嗚呼若鶴年者豈向數公之流亞歟然數公之在當時皆達而在上者也世之士子孰不膾炙其言辭鶴年遭夫氣運之適衰方獨退處遐陬而為所謂窮者之詩以自慰其能知夫注意之深用工之至者幾何人哉知與不知在鶴年未足輕重第以祖宗涵煦百年之久致使遐方絶域之詩俱得繫之天子之國而鶴年之所以著明王化民俗之盛以與數公並傳於斯世者將遂泯無聞矣不亦重可悲夫故取其吟藁若干卷序而傳之以俟世之知鶴年者相與諷詠焉耳鶴年之清節竣行已别有傳兹不著金華戴良序太學生戴習録其師鶴年先生詩曰海巢集者請題其後鶴年豫友也其詩忠義慷慨有騷雅之遺意焉昔唐之僧有讀其友盧同之詩者曰鯨吞海水盡露出珊瑚枝海神知貴不知價留與人間光照夜吾讀海巢集亦云生其寶之生其寶之虎丘淡居老人至仁書
