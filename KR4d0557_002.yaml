已幸玄堂新改厝猶慚丙舍未經營名隨版籍遙編越身戀松楸重去荆存沒離魂同慘慘往還孤影復煢煢敢方王粲依劉表竊冀興宗念子平為政古來先孝弟願伸人子未伸情過安慶追悼余文貞公將軍匹馬入舒城擊賊頻煩訓義兵孝以保家忠徇國聚而出戰散歸耕圍侔月暈全無隙捷振天威大有聲遊説飛書徒間諜輸誠伏節愈堅貞雲梯屢却妖氛豁露布交馳殺氣平千里荆揚憑保障七年淮海賴澄清山深猰㺄殱還出江濶鯨鯢斬更橫外援內儲俱斷絶裹瘡飲血獨支撑天昏苦霧埋營壘日落隂風卷斾旌甘與張巡為癘鬼肯同王衍誤蒼生三千將士皆從死百二山河亦繼傾靜對風霆思號令遙從箕尾識精誠頌碑不愧詞臣色哀詔偏傷聖主情願為執鞭生不遂臨風三酹重沾纓讀應奉兄登科記愴然傷懷因成八韻射䇿彤廷被寵榮遺經三復若為情重傷趙璧經時毁翻恨隋珠徹夜明洪範有書傳太乙佳城無郭葬長庚青雲路斷甘淪沒碧海塵飛苦變更自信為臣當委質誰能向賊更求生家貧寡弱遺妻子道逺存亡隔弟兄一旦音容成永訣十年涕淚鎮交橫茫茫原隰無求處獨立長風送鴈聲絶句敬書宸翰後神龍歸卧北溟波愁絶隂山敕勒歌惟有遺珠光奪目萬年留得照山河題茀郎天馬圖春明立仗氣如山顧盼俄空十二間一去瑶池消息斷西風吹影落人間題桃源圖放舟長怪武陵人強覓桃花洞裏春若使仙源通一線如何避得虎狼秦暮春二首楊花榆莢攪晴空上界春歸下界同蜂蝶紛紛竟何在獨留杜宇怨殘紅一夕春歸遍九垓千紅萬紫盡塵埃韶光淑氣逡巡退暑雨炎風爛熳來題畫江樹青紅江草黃好山不斷楚天長雲中樓觀無人住只有秋聲送夕陽題萬嵗山玩月圖金銀樓觀鬱嵯峨琪樹風涼秋漸多徙倚危欄倍惆悵月中猶見舊山河題畫葡萄故人毛楚哲作西域葡萄事已非故人揮灑出天機碧雲涼冷驪龍睡拾得遺珠月下歸榮枯春意方酣紅杏蕊秋聲又戰碧梧枝野人不識春官厯坐閲榮枯紀嵗時牡丹名花傾國不凡材池館春深尚未開風雨一宵桃李盡異香清曉九天來梧桐井梧徹夜下霜風錦繡園林瞬息空老盡秋容何足惜鳯巢吹墮月明中聞簫給喪未必無周勃乞食誰能辨伍員昨日英雄今日恨洞簫忍向亂中聞聞鴈月落江城轉四更旅魂和夢到灤京醒來獨背寒燈坐風送長空鴈幾聲讀鄭氏義門傳每病漢民歌布粟忍聞秦俗德耰鋤鄭家九葉猶同㸑風俗如今古不如題梅花扇面寄五十僉憲憶向西湖踏早春萬花如玉月如銀一枝照影臨清淺滿面氷霜似故人題族兄馬子英進士梅花池館春深看牡丹五陵車馬隘長安誰知凛凛氷霜際却是梅花守嵗寒題前人竹石嘉樹圖翠實可充丹鳯食喬枝仍待早鶯遷一拳蒼蘚荒秋雨惆悵無人解補天題表兄賽景初院中新竹景初故咸陽王賽音齊之孫也雙玉亭亭出粉墻便添風月入吟觴會看直上三千尺截簡先書異姓王贈表兄賽景初蕭條門巷舊王孫旋寫黃庭換緑樽富貴倘來還自去只留清氣在乾坤雨窗宴坐與表兄論作詩寫字之法各一首南窗薄暮雨如絲茗碗熏爐共論詩天趣悠悠人意表忘言相對坐多時蠅頭小楷寫烏絲字字鍾王盡可師忽悟庖犧初畫象工夫元不在臨池題顧仲贄先生南山遺藁後玄豹無心守九關日隨霧雨隱南山莫嗟遺鞹同羊犬猶託文章見一斑題林泉野趣圖清江白石帶踈林樊口幽居尚可尋夢裏草堂無恙在秋風春雨總關心題貓食有溪魚卧有禋受恩深重更無倫苦將乳鼠誇為瑞恐負隆冬蠟祭人題鷹修翎快劔爪剛鉤自獵平生恥下韝擊盡秋原梟與獍却從靈囿鳯麟遊題鴈兵戈故國日凋殘野蔓荒煙白骨寒目送飛鴻度關塞有書無處報平安題鶯當年百囀上林苑身愈髙時韻愈竒兵火十年喬木盡託棲那敢怨枝卑元旦與天淵長老雪後泛溪不將柏葉圍爐飲却為梅花放棹看詩在灞橋驢子上阿師空忍雪山寒迎大年椿上人不值暮歸偶成東歸間道已浮杯力疾遙迎日幾回何處晚來成誤認風簾竹影月窗梅題椿上人梅花姢姢淨色雪消餘剪剪寒香月上初標格若教諸佛見肯教薝蔔譬真如寄龍門禪師二首師自號補衲上方樓閣閟煙霞補衲重來嵗月賒拄杖入門如隔世依然翠竹對黃花靈山積雪赤城霞咫尺東西路不賒破碎衲衣剛補就不須天女散天花題天師竹琅玕仙節鬱蕭森知受三天雨露深投老相求訪真訣獨騎龍杖度千岑題畫水榭山窗面面同縠紋波起鯉魚風溪頭艇子林間泛來往能無避俗翁題會稽王冕翁畫梅永和筆陳在山隂家法惟君悟最深寓得梅花兼二妙右軍風致廣平心紅梅姑射仙人煉玉砂丹光晴貫洞中霞無端半夜東風起吹作江南第一花紅梅翠竹瓊仙服盡紫金丹不識人間有嵗寒一笑荒村春似海載歌淇澳報平安水仙花二首湘雲冉冉月依依翠袖霓裳作隊歸怪底香風吹不斷水晶宫裏宴江妃影娥池上晚涼多羅襪生塵水不波一夜碧雲凝作夢醒來無奈月明何竹枝詞二首竹雞啼處一聲聲山雨來時郎欲行蜀天恰似離人眼十日都無一日晴水上摘蓮青的的泥中採藕白纎纎却笑同根不同味蓮心清苦藕芽甜題定海樂節婦劉氏沿江泣尋夫尸卷怨入江雲結晝隂潮䀶清淺淚䀶深白頭重見黃泉下方盡寒燈一寸心題松江梧桐鄉鳴鳯里朱節婦卷手植梧桐不憚勞朝陽鳴鳯一來遨托棲未穩翻然逝慰眼惟遺五色毛重到戴玄學齋居憶坐詩壇棹酒船花枝旖旎月嬋娟一從鳬舄朝天去月夕花朝兩惘然題竹間翁白馬圖誰識驊騮汗血中靜團晴雪動生風一從選入天間內不覺人間萬馬空題唐申王三駿圖三駿英英出渥窪太平芻粟飽天家誰知百戰平河北汗血功歸獅子花戲題明皇照夜白圖天上麒麟天下稀月中幾送八姨歸君王寓目應追悔誤看乘鸞度羽衣題劉伯升所藏蘭亭右軍髙致極清真盛集蘭亭詠暮春文彩風流那復見摩挲遺墨想丰神蘭蕙軒為滁陽張景暘景昭兄弟所作八龍天矯同瑶席三鳯聯翩上玉堂爭似髙軒蘭與蕙光風逺近遞清香武昌南湖度夏湖山新雨洗炎埃萬朵清蓮鏡裏開日暮菱歌動南浦女郎雙槳蕩舟來紅蓮白藕詩二首紅蓮白藕兩相宜欲採臨流意轉遲蓮子縱甜心獨苦藕芽雖美腹多絲採蓮採藕湖水潯阿儂踏歌郎賞音多虛少實如郎意外甜內苦似儂心送蔡用嚴還四明二首四明故舊苦無多死别生離奈若何老淚暗添江漢水隨人去作海東波迢遙海國接江鄉一度懷人一斷腸正值西風搖落際可堪重送蔡中郎寄四明諸友海上歸期苦恨遲歸心日與海爭馳故人有待吾衰矣一寸寒灰萬縷絲寄武昌嚴靜山賢友出門便有好湖山對酒當歌莫暫間不請自來留却去無情白髮與朱顔次舒菴見訪韻退食從容馬首東夕陽斜映栁營紅掃門將帥遙相待却訝寒齋訪秃翁哭四明宋廷臣推官甬東郭外為鄰住湖北城中值宦遊直擬千回同一日那知一别竟千秋題水竹居卷夜夢青鸞浴鳯池曉來水竹索題詩涴花吏隱無人繼老我風塵寫愧辭寄武昌張尚本緑鬢朱顔素節新嵗寒風雪苦相侵明堂清廟登庸日佇聽簫韶奏治音鶴年詩集卷二
