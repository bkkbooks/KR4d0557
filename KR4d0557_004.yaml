body:
  text: 論曰子盡禮於父母固人所當爾至感夫髙逺幽冥而驗焉者非精誠之心涉至難而罔渝者弗能也豫考史册方多古少今孰意鶴年傑然處頑薄之中為人之所獨也彼髙逺幽冥且足以感之又豈不能感諸人乎嗚呼何其偉哉詩曰丁鶴年精誠之心上逹九天丁鶴年精誠之心下逹九泉先翁曽長武昌縣死葬山中厄兵變山中父老懷甘棠修築堂封自相勸鶴年避亂東海頭年深道阻生煩憂亂靖還尋武昌路淚㾗滴滿先翁丘倣徨改葬樊山側不惜黃金換沙石此身尚在天地間何事能令慰朝夕卜日已定雨漫漫十日不止難下棺仰首呼天雨中拜雨為閣住隂雲端葬後倉皇下山去大雨依然大如注是時送葬紛如雲祭奠爭趨墓邊路母困干戈生别離兒大母死才得歸但聞母死葬村落問人葬地俱不知村落蓬蒿暗荒土數月走尋心獨苦焚香祝母如有靈為報沉淪在何許夢中忽見别時容步上髙堂言未終牽衣慟哭自驚覺清晨起接鄰家翁翁言昨夜夢而母親出房櫳贈尊酒夢間此夕精靈通蚤晚應當見枯朽共披荆棘凌風霜平地有坎疑有藏灑飯陳辭屬深土遺骸果見生輝光恐認他人心臲􅑶嚙血淋漓試枯骨枯骨通紅知可徴一齒當門正如漆重製衣冠新作墳遷葬母骨安母魂積恨誰知滿胸臆烈風頓掃空中雲丁鶴年病且癯何異常人七尺軀丁鶴年能讀書何人不解探𤣥珠一片精誠獨如此回首世人空有子
  hash: sha256:eea3f6c721a6952ed9eeca1ac12efa368bea39046f179f9eb166d3ef015b65b4
