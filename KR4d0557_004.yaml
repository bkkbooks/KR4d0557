front:
  text: 鶴年詩集傳丁孝子名鶴年字鶴年西域人性狷介窮經博史尤工於詩自其祖阿老丹公入中夏世為顯官父職馬祿丹官武昌縣最長有善政殁而就葬武昌後兵亂鶴年倉卒奉母夫人走南徐世父家生母馮先避匿邑之東村東村首難竟阻絶莫知之也餘十載母夫人殁鶴年又避地明之定海聞父墓嘗為盜發掘生母亦病死葬洪道鄉俱不得往省視日夕憂悸且却絶酒肉鹽酪示自貶又二十載道既通即告牒還武昌至則别竁地樊山窆父棺卜日襄事日已迫而淋雨十日不止鶴年先一夕仰天悲泣拜雨中願翌日雨止半日許終事俟至質明密雲雖四塞雨則強不澍也及發引視窆而返雨傾瀉如故已而訪生母葬地村聚間村聚自兵不省何所自秋徂冬遍訊之終莫有知者鶴年無以措意惟作母主蚤莫拜前祈五旬浹有報拜至七日夜夢母氏出髙堂中鶴年遽牽衣慟哭以慟而即寤晨起鄰老有楊重者至云吾昨夢子之母氏堂宇間自內出以酒肉見賜三人內一人勿御也鶴年以夢母氏與鄰老同夢之夕又同所母氏堂宇在舊所居廢宅之西又同斯見母氏葬地朕兆也試即其地與萊荒土物色之因具畚插偕往徘徊顧視見平陸土有陷下者鶴年意謂吾聞母葬時無棺槨下輳土甎上覆舟板人與板朽腐盡乃爾茲殆可啓而觀歟遂陳酒肉以祭祭畢斸其土骨果見板尚有松節土甎亦具在良是矣然恐他墓偶有同者復嚙血骨上以試良久抆去血骨通變茜色可驗母一齒當正中如漆視之益驗時四人享祭餘鶴年不入口又與鄰老無少爽乃收骨棺斂葬是鄉慈母王墓在寒溪塘併加封樹鶴年就廬於父墓將終其身
